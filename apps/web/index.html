<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/media/icon.png">
    <link rel="apple-touch-icon" href="/media/icon.png">
    <link rel="stylesheet" href="/media/vendor/katex/katex.min.css">
    <link rel="stylesheet" href="/media/preview-style.css">
    <link rel="stylesheet" href="/apps/web/web.css">
    <title>SnapTeX Web Preview</title>
</head>
<body
    data-explorer-collapsed="true"
    data-tikz-jax-js-uri="/media/vendor/tikzjax/tikzjax.js"
    data-tikz-jax-css-uri="/media/vendor/tikzjax/fonts.css"
    data-pdf-js-uri="/media/vendor/pdfjs/pdf.mjs"
    data-pdf-worker-uri="/media/vendor/pdfjs/pdf.worker.mjs"
>
    <main id="app-shell">
        <header id="web-toolbar" aria-label="Project controls">
            <div class="toolbar-group">
                <a id="snaptex-brand" href="." aria-label="SnapTeX Web">
                    <img src="/media/icon.png" alt="" aria-hidden="true">
                    <span>SnapTeX</span>
                </a>
                <button id="toggle-explorer-button" type="button" aria-expanded="false" aria-controls="explorer-panel">Explorer</button>
                <button id="open-file-button" type="button">Open TeX</button>
                <button id="open-folder-button" type="button">Open Folder</button>
                <button id="save-button" type="button">Save</button>
            </div>
            <div class="toolbar-group toolbar-paths" aria-live="polite">
                <span id="active-path-label">/demo/main.tex</span>
                <span id="root-path-label">root: /demo/main.tex</span>
            </div>
            <div class="toolbar-group toolbar-actions">
                <button id="set-root-button" type="button">Set Root</button>
                <button id="settings-button" type="button" aria-expanded="false" aria-controls="settings-menu">Settings</button>
                <span id="project-status">Loading demo project...</span>
            </div>
            <div id="settings-menu" hidden>
                <div class="settings-section">
                    <label><input id="show-explorer-toggle" type="checkbox"> Explorer</label>
                    <label><input id="show-diagnostics-toggle" type="checkbox" checked> Diagnostics</label>
                </div>
                <div class="settings-section">
                    <label><input id="live-preview-toggle" type="checkbox" checked> Live preview</label>
                    <label><input id="auto-scroll-toggle" type="checkbox" checked> Auto scroll sync</label>
                    <label><input id="virtual-mode-toggle" type="checkbox" checked> Virtual mode</label>
                    <label><input id="debug-memory-toggle" type="checkbox"> Debug memory</label>
                </div>
                <label class="setting-row">
                    <span>Render delay</span>
                    <input id="render-delay-input" type="number" min="0" max="2000" step="25" value="150">
                </label>
                <label class="setting-row">
                    <span>Scroll delay</span>
                    <input id="auto-scroll-delay-input" type="number" min="0" max="2000" step="25" value="100">
                </label>
                <label class="setting-row">
                    <span>Theme</span>
                    <select id="theme-select">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="blue">Blue</option>
                        <option value="rose">Rose</option>
                    </select>
                </label>
            </div>
        </header>
        <div id="workspace">
            <aside id="explorer-panel" aria-label="Project explorer">
                <div class="panel-title">Explorer</div>
                <div id="project-files" role="tree" aria-label="Project files"></div>
                <div id="project-diagnostics" aria-live="polite"></div>
            </aside>
            <section id="editor-pane" aria-label="LaTeX editor">
                <div id="editor"></div>
            </section>
            <div id="splitter" role="separator" aria-orientation="vertical" aria-label="Resize editor and preview panes"></div>
            <section id="preview-pane" aria-label="SnapTeX preview">
                <div id="content-root"></div>
            </section>
        </div>
        <input id="open-file-input" type="file" accept=".tex" hidden>
        <input id="open-folder-input" type="file" webkitdirectory multiple hidden>
    </main>
    <script>
        window.snaptexPreviewMessageQueue = [];
        window.snaptexPreviewBridge = {
            postMessage(message) {
                if (window.snaptexStandaloneHost) {
                    window.snaptexStandaloneHost.handlePreviewMessage(message);
                } else {
                    window.snaptexPreviewMessageQueue.push(message);
                }
            }
        };
    </script>
    <script src="/media/webview-main.js"></script>
    <script src="/media/webview-pdf.js"></script>
    <script src="/apps/web/dist/web-main.js"></script>
</body>
</html>
